<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSY-OPS CORE v.24.6</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; --oracle: #00ccff; --red: #ff3333; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        canvas#m-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; z-index: 0; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .btn { background: transparent; border: 1px solid rgba(0, 255, 65, 0.4); color: var(--neon); padding: 18px; cursor: pointer; text-transform: uppercase; font-family: inherit; font-size: 13px; letter-spacing: 4px; width: 100%; max-width: 280px; margin: 10px 0; transition: 0.2s; }
        .btn-blue { border-color: var(--oracle); color: var(--oracle); }
        .hub-container { width: 260px; height: 260px; border: 1px solid rgba(0, 255, 65, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #hub-canvas { width: 190px; height: 190px; }
        #v-card { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; background: #000; border: 1px solid var(--neon); padding: 20px; z-index: 1000; display: none; flex-direction: column; align-items: center; }
        #v-card.open { display: flex; }
    </style>
</head>
<body>
    <canvas id="m-bg"></canvas>

    <div id="s-main" class="screen active">
        <div class="hub-container" onclick="showStoredProfile()">
            <canvas id="hub-canvas"></canvas>
            <div id="id-tag" style="margin-top: 20px; letter-spacing: 7px;"></div>
        </div>
        <button class="btn" style="margin-top: 40px;" id="start-trigger">ЗАПУСТИТЬ ТЕСТ</button>
        <button id="hub-oracle-btn" class="btn btn-blue" style="display:none;">ОРАКУЛ</button>
    </div>

    <div id="s-test" class="screen">
        <div id="test-content" style="margin-bottom: 20px;">АНАЛИЗ...</div>
        <button class="btn" onclick="finishTest()">ЗАВЕРШИТЬ</button>
    </div>

    <div id="v-card">
        <h1 id="v-type"></h1>
        <button class="btn" onclick="backToHub()">ВЕРНУТЬСЯ</button>
    </div>

    <script>
        let aCtx, currentProfile = "АНАЛИТИК";
        const PROFILES = {
            "АНАЛИТИК": "Истина всегда лежит между строк кода.",
            "АРХИТЕКТОР": "Твой план идеален. Но не забывай про хаос вне системы.",
            "ИМПУЛЬС": "Скорость — твоя единственная броня.",
            "СКАНЕР": "Они думают, что скрылись. Покажи им обратное."
        };

        // ТРИГГЕРЫ СОБЫТИЙ
        document.getElementById('start-trigger').addEventListener('pointerdown', function() {
            unlockAudio();
            sw('s-test');
        });

        document.getElementById('hub-oracle-btn').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            oracleSpeak();
        });

        function sw(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function unlockAudio() {
            // Разблокировка WebAudio
            if (!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (aCtx.state === 'suspended') aCtx.resume();

            // Разблокировка Синтеза речи (пустой звук)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let utterance = new SpeechSynthesisUtterance(" ");
                utterance.volume = 0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function oracleSpeak() {
            if (!('speechSynthesis' in window)) return;
            
            // Если контекст уснул - будим
            if (aCtx && aCtx.state === 'suspended') aCtx.resume();

            window.speechSynthesis.cancel(); // Сброс очереди
            
            const text = PROFILES[currentProfile] || "Система готова.";
            const msg = new SpeechSynthesisUtterance(text);
            
            // Настройка параметров для "роботизации"
            msg.lang = 'ru-RU';
            msg.pitch = 0.7;
            msg.rate = 0.8;
            msg.volume = 1.0;

            // Форсированный поиск русского голоса
            const voices = window.speechSynthesis.getVoices();
            const ruVoice = voices.find(v => v.lang.includes('ru') || v.name.includes('Russian'));
            if (ruVoice) msg.voice = ruVoice;

            window.speechSynthesis.speak(msg);
            
            // Визуальный фидбек
            const btn = document.getElementById('hub-oracle-btn');
            btn.style.background = "rgba(0, 204, 255, 0.3)";
            setTimeout(() => btn.style.background = "transparent", 200);
        }

        function finishTest() {
            document.getElementById('v-type').innerText = currentProfile;
            document.getElementById('v-card').classList.add('open');
        }

        function backToHub() {
            document.getElementById('v-card').classList.remove('open');
            document.getElementById('id-tag').innerText = currentProfile;
            document.getElementById('hub-oracle-btn').style.display = 'block';
            sw('s-main');
        }

        // Фоновый матричный эффект
        const mc = document.getElementById('m-bg'); const mx = mc.getContext('2d');
        let mw = mc.width = window.innerWidth, mh = mc.height = window.innerHeight;
        const drops = Array(Math.floor(mw/20)).fill(1);
        function drawM() {
            mx.fillStyle = 'rgba(0,0,0,0.1)'; mx.fillRect(0,0,mw,mh); mx.fillStyle = '#00ff41';
            drops.forEach((y, i) => {
                mx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
                if(y*20 > mh && Math.random() > 0.98) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(drawM, 70);

        // Ждем загрузки голосов (важно для Android/Chrome)
        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Голоса обновлены:", window.speechSynthesis.getVoices().length);
        };
    </script>
</body>
</html>

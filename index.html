<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSY-OPS CORE</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; --oracle: #00ccff; --red: #ff3333; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--neon); font-family: monospace; overflow: hidden; touch-action: manipulation; }
        canvas#m-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; z-index: 0; pointer-events: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; cursor: pointer; text-transform: uppercase; font-family: inherit; width: 100%; max-width: 260px; margin: 8px 0; letter-spacing: 2px; }
        .btn-blue { border-color: var(--oracle); color: var(--oracle); }
        .hub-container { width: 220px; height: 220px; border: 1px solid rgba(0, 255, 65, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #hub-canvas { width: 180px; height: 180px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 300px; }
        .cell { aspect-ratio: 1; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .cell.err { background: var(--red); }
        .cell.ok { background: var(--neon); color: #000; }
        #v-card { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; background: #000; border: 1px solid var(--neon); padding: 25px; z-index: 1000; display: none; flex-direction: column; align-items: center; }
        #v-card.open { display: flex; }
        .bar { width: 100%; height: 2px; background: #111; margin: 10px 0; position: relative; }
        .fill { height: 100%; width: 0%; background: var(--neon); transition: 1.5s; }
        .sync-word { position: absolute; cursor: pointer; font-size: 14px; opacity: 0; transition: 0.4s; }
    </style>
</head>
<body>
    <canvas id="m-bg"></canvas>

    <div id="s-main" class="screen active">
        <div class="hub-container" onclick="showStoredProfile()">
            <canvas id="hub-canvas"></canvas>
            <div id="id-tag" style="margin-top:15px; font-size:12px; letter-spacing:4px;"></div>
        </div>
        <button class="btn" style="margin-top:30px;" ontouchend="startSequence()" onclick="startSequence()">ЗАПУСТИТЬ ТЕСТ</button>
        <button id="hub-oracle-btn" class="btn btn-blue" style="display:none;" ontouchend="oracleSpeak()" onclick="oracleSpeak()">ОРАКУЛ</button>
    </div>

    <div id="s-psych" class="screen"><p id="q-text"></p><div id="q-options" style="width:100%"></div></div>
    <div id="s-react" class="screen"><div id="timer-display" style="font-size:24px; color:var(--oracle)">0.000</div><div id="react-grid" class="grid"></div></div>
    <div id="s-mem" class="screen"><div id="mem-grid" class="grid" style="grid-template-columns: repeat(3, 1fr); width:240px;"></div></div>
    <div id="s-sync" class="screen"><div id="words-container" style="position:relative; width:100%; height:80vh;"></div></div>

    <div id="v-card">
        <h2 id="v-type" style="letter-spacing:8px"></h2>
        <div style="width:100%; font-size:10px; text-align:left">LOGIC <div class="bar"><div id="v-bar-log" class="fill"></div></div></div>
        <div style="width:100%; font-size:10px; text-align:left">SPEED <div class="bar"><div id="v-bar-react" class="fill" style="background:var(--red)"></div></div></div>
        <button class="btn" style="margin-top:20px" onclick="backToHub()">ВЕРНУТЬСЯ</button>
    </div>

    <script>
        let aCtx, score = {}, target = 1, isDone = false, currentProfile = null;
        let curQ = 0, reactStartTime, finalReactTime = 0, memStep = 0, memSeq = [];

        const PROFILES = {
            "АРХИТЕКТОР": { log: 95, oracle: "Твой план идеален. Но не забывай про хаос." },
            "ИМПУЛЬС": { log: 45, oracle: "Скорость — твоя единственная броня." },
            "АНАЛИТИК": { log: 90, oracle: "Истина лежит между строк кода." },
            "СКАНЕР": { log: 85, oracle: "Они думают, что скрылись. Найди их." }
        };

        const QUESTIONS = [
            {q: "Код — это?", o: [{t: "Структура", a: "АРХИТЕКТОР"}, {t: "Движение", a: "ИМПУЛЬС"}]},
            {q: "Приоритет?", o: [{t: "Данные", a: "АНАЛИТИК"}, {t: "Интуиция", a: "СКАНЕР"}]}
        ];

        const SYNC_WORDS = [{t: "Σ", a: "АРХИТЕКТОР"}, {t: "Δ", a: "ИМПУЛЬС"}, {t: "Ω", a: "АНАЛИТИК"}, {t: "Ψ", a: "СКАНЕР"}];

        function sw(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function startAudio() {
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') aCtx.resume();
            if ('speechSynthesis' in window) {
                const s = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(s);
            }
        }

        function startSequence() { startAudio(); curQ = 0; score = {}; sw('s-psych'); renderQ(); }

        function renderQ() {
            const q = QUESTIONS[curQ]; document.getElementById('q-text').innerText = q.q;
            const box = document.getElementById('q-options'); box.innerHTML = "";
            q.o.forEach(o => {
                const b = document.createElement('button'); b.className = "btn"; b.innerText = o.t;
                b.onclick = () => { score[o.a] = (score[o.a] || 0) + 1; curQ++; if(curQ < QUESTIONS.length) renderQ(); else startReactTest(); };
                box.appendChild(b);
            });
        }

        function startReactTest() { sw('s-react'); target = 1; reactStartTime = Date.now(); renderReactGrid(); }
        function renderReactGrid() {
            const g = document.getElementById('react-grid'); g.innerHTML = "";
            let ns = Array.from({length: 16}, (_, i) => i+1).sort(() => Math.random() - 0.5);
            ns.forEach(n => {
                const c = document.createElement('div'); c.className = "cell"; c.innerText = n;
                c.onclick = () => { if(n === target) { target++; if(target > 16) { finalReactTime = (Date.now()-reactStartTime)/1000; startMemTest(); } else renderReactGrid(); } };
                g.appendChild(c);
            });
        }

        function startMemTest() { sw('s-mem'); nextMem(); }
        function nextMem() {
            memSeq = Array.from({length: 3}, () => Math.floor(Math.random()*9));
            const mg = document.getElementById('mem-grid'); mg.innerHTML = "";
            for(let i=0; i<9; i++) { const c = document.createElement('div'); c.className = "cell"; c.onclick = () => sw('s-sync'); mg.appendChild(c); }
            const cells = mg.children;
            memSeq.forEach((id, i) => setTimeout(() => { cells[id].style.background = "var(--oracle)"; setTimeout(() => cells[id].style.background = "", 300); }, i*600));
        }

        function startSyncTest() {
            sw('s-sync'); const con = document.getElementById('words-container');
            SYNC_WORDS.forEach(word => {
                const w = document.createElement('div'); w.className = "sync-word"; w.innerText = word.t;
                w.style.left = Math.random()*80 + "%"; w.style.top = Math.random()*80 + "%";
                con.appendChild(w); setTimeout(() => w.style.opacity = 1, 100);
                w.onclick = () => { score[word.a] = (score[word.a] || 0) + 2; finalize(); };
            });
        }

        function finalize() {
            let type = Object.keys(score).reduce((a, b) => score[a] > score[b] ? a : b) || "АНАЛИТИК";
            currentProfile = type; isDone = true;
            document.getElementById('v-type').innerText = type;
            document.getElementById('v-card').classList.add('open');
            setTimeout(() => {
                document.getElementById('v-bar-log').style.width = PROFILES[type].log + "%";
                document.getElementById('v-bar-react').style.width = "70%";
            }, 500);
        }

        function backToHub() { document.getElementById('v-card').classList.remove('open'); document.getElementById('id-tag').innerText = currentProfile; document.getElementById('hub-oracle-btn').style.display = 'block'; sw('s-main'); renderAvatar(currentProfile); }
        
        function oracleSpeak() {
            if (!currentProfile) return;
            startAudio();
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(PROFILES[currentProfile].oracle);
            m.lang = 'ru-RU'; m.rate = 0.8;
            window.speechSynthesis.speak(m);
        }

        function renderAvatar(type) {
            const c = document.getElementById('hub-canvas'); const ctx = c.getContext('2d');
            c.width = 180; c.height = 180; let frame = 0;
            function anim() {
                if(!isDone) return; ctx.clearRect(0,0,180,180); ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 1; ctx.beginPath();
                if(type === "ИМПУЛЬС") { 
                    ctx.moveTo(90, 90); for(let i=0; i<25; i++) { let r = 5 + i*3; let a = frame*2 + i*0.4; ctx.lineTo(90 + Math.cos(a)*r, 90 + Math.sin(a)*r); }
                } else { ctx.arc(90, 90, 60, 0, Math.PI*2); }
                ctx.stroke(); frame += 0.02; requestAnimationFrame(anim);
            }
            anim();
        }

        const mc = document.getElementById('m-bg'); const mx = mc.getContext('2d');
        let mw = mc.width = window.innerWidth, mh = mc.height = window.innerHeight;
        const dr = Array(40).fill(1);
        setInterval(() => {
            mx.fillStyle = 'rgba(0,0,0,0.1)'; mx.fillRect(0,0,mw,mh); mx.fillStyle = '#00ff41';
            dr.forEach((y, i) => { mx.fillText("01", i*25, y*20); if(y*20 > mh && Math.random() > 0.9) dr[i] = 0; dr[i]++; });
        }, 80);
    </script>
</body>
</html>

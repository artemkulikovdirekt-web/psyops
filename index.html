<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PSY-OPS CORE v.20.2</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --oracle: #00ccff; --red: #ff4444; }
        
        /* Общие настройки — убираем лишние отступы и фиксим высоту */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; }
        
        canvas#m { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; z-index: 0; pointer-events: none; }

        /* Контейнер экрана — центрирует всё внутри */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; padding: 20px; text-align: center; }
        .active { display: flex; }

        /* Центральный хаб (Радар) */
        .terminal-hub { width: 70vw; height: 70vw; max-width: 280px; max-height: 280px; border: 1px solid var(--neon); background: rgba(0,20,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
        #avatar-canvas { width: 90%; height: 90%; }

        /* Кнопки — теперь они не ломают верстку */
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; cursor: pointer; text-transform: uppercase; font-family: inherit; font-weight: bold; width: 100%; max-width: 320px; transition: 0.2s; letter-spacing: 1px; margin: 8px 0; border-radius: 0; font-size: 14px; outline: none; }
        .btn:active { background: var(--neon); color: #000; }

        /* Вопросы — гибкий размер шрифта */
        #q-text { font-size: clamp(16px, 4vw, 20px); line-height: 1.4; min-height: 80px; margin-bottom: 20px; color: #fff; width: 100%; max-width: 450px; }
        #options-list { width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* Игровая сетка 4х4 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90vw; max-width: 320px; }
        .cell { aspect-ratio: 1; background: rgba(0,255,65,0.05); border: 1px solid #222; display: flex; align-items: center; justify-content: center; color: var(--neon); cursor: pointer; font-size: 20px; font-weight: bold; }
        .cell.err-flash { background: var(--red) !important; color: #000; }

        /* Карточка профиля (V-Card) */
        #v-card { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 400px; background: #000; border: 2px solid var(--neon); padding: 20px; z-index: 1000; display: none; flex-direction: column; box-shadow: 0 0 50px #000; }
        #v-card.open { display: flex; }
        .stat-bar { width: 100%; height: 8px; background: #111; margin: 5px 0 15px; border: 1px solid #222; }
        .stat-fill { height: 100%; background: var(--neon); width: 0%; transition: 2s cubic-bezier(0.1, 0, 0, 1); }
        .badge { border: 1px solid var(--neon); padding: 10px; font-size: 12px; margin: 5px 0; cursor: pointer; }
        .info-text { display: none; font-size: 12px; color: #aaa; padding: 10px; border-left: 1px solid var(--neon); margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body onclick="initAudioOnce()">
    <canvas id="m"></canvas>

    <div id="s-main" class="screen active">
        <div class="terminal-hub" id="t-hub" onclick="showProfile()">
            <canvas id="avatar-canvas"></canvas>
            <div id="p-label" style="display:none; margin-top:10px; font-weight:bold; letter-spacing:3px; font-size:12px;"></div>
        </div>
        <button class="btn" onclick="startSequence()">ИНИЦИАЦИЯ</button>
        <button id="btn-oracle" class="btn" style="display:none; border-color:var(--oracle); color:var(--oracle);" onclick="oracleSpeak()">ОРАКУЛ</button>
    </div>

    <div id="s-test" class="screen">
        <p id="q-text"></p>
        <div id="options-list"></div>
        <p id="q-counter" style="margin-top:20px; font-size:10px; opacity:0.5; letter-spacing:2px;"></p>
    </div>

    <div id="s-game" class="screen">
        <div id="target-hint" style="font-size:24px; margin-bottom:15px; letter-spacing:5px;">ПОИСК: 1</div>
        <div id="g-grid" class="grid"></div>
        <div id="att-bar" style="margin-top:20px; color:var(--red); letter-spacing:3px;">[ ■ ■ ■ ]</div>
    </div>

    <div id="v-card">
        <h2 id="d-title" style="margin:0; letter-spacing:4px; text-align:center;"></h2>
        <div style="margin: 15px 0; font-size:12px;">
            ЛОГИКА <div class="stat-bar"><div id="b-log" class="stat-fill"></div></div>
            РЕАКЦИЯ <div class="stat-bar"><div id="b-react" class="stat-fill" style="background:var(--red)"></div></div>
            ПАМЯТЬ <div class="stat-bar"><div id="b-mem" class="stat-fill" style="background:var(--oracle)"></div></div>
        </div>
        <div class="badge" onclick="tgl('pi')">СПОСОБНОСТЬ</div><div id="pi" class="info-text"></div>
        <div class="badge" onclick="tgl('di')" style="border-color:var(--red); color:var(--red)">ДЕБАФФ</div><div id="di" class="info-text"></div>
        <button class="btn" style="width:100%; margin-top:15px;" onclick="closeProfile()">ЗАКРЫТЬ</button>
    </div>

    <script>
        let aCtx, sc={}, target=1, curQ=0, attempts=3, isDone=false, fType;
        
        function initAudioOnce() {
            if (aCtx) return;
            try {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bS = 2 * aCtx.sampleRate, b = aCtx.createBuffer(1, bS, aCtx.sampleRate), out = b.getChannelData(0);
                for (let i = 0; i < bS; i++) out[i] = Math.random() * 2 - 1;
                const n = aCtx.createBufferSource(); n.buffer = b; n.loop = true;
                const f = aCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 150;
                const g = aCtx.createGain(); g.gain.value = 0.02;
                n.connect(f); f.connect(g); g.connect(aCtx.destination); n.start();
            } catch(e) { console.log('Audio init failed'); }
        }

        function beep(f=800, d=0.1, type='triangle') {
            if(!aCtx) return;
            const o=aCtx.createOscillator(), g=aCtx.createGain();
            o.type=type; o.frequency.setValueAtTime(f, aCtx.currentTime);
            g.gain.setValueAtTime(0.1, aCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, aCtx.currentTime+d);
            o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime+d);
        }

        const DATA = {
            "АРХИТЕКТОР": { log:95, pi:"Векторное мышление и планирование.", di:"Трудно адаптируется к хаосу.", oracle:"Мир — это чертеж. Не допускай лишних линий." },
            "ОПЕРАТОР": { log:40, pi:"Мгновенное принятие решений в стрессе.", di:"Быстрое выгорание.", oracle:"Действие важнее раздумий. Скорость — это жизнь." },
            "АНАЛИТИК": { log:90, pi:"Синтез данных и поиск скрытых связей.", di:"Склонность к самоизоляции.", oracle:"Смотри на цифры. Они никогда не лгут." },
            "СКАНЕР": { log:80, pi:"Выявление рисков и чужих намерений.", di:"Фоновое недоверие к системе.", oracle:"Ничто не защищено. Найди уязвимость первым." },
            "ТЕХНО-МЕДИУМ": { log:60, pi:"Интуитивное понимание сложных процессов.", di:"Размытие личных границ.", oracle:"Растворись в потоке данных. Чувствуй ритм." }
        };

        const qs = [
            {q:"Конфликт в команде. Ваша стратегия?", o:[{t:"Создать план примирения", a:"АРХИТЕКТОР"},{t:"Использовать ситуацию для выгоды", a:"СКАНЕР"}]},
            {q:"Сложная задача без инструкций:", o:[{t:"Искать логику и паттерны", a:"АНАЛИТИК"},{t:"Действовать методом проб", a:"ОПЕРАТОР"}]},
            {q:"Ваш главный раздражитель:", o:[{t:"Хаос и глупость", a:"АРХИТЕКТОР"},{t:"Медлительность", a:"ОПЕРАТОР"}]},
            {q:"Идеальное состояние:", o:[{t:"Тихий анализ в одиночестве", a:"АНАЛИТИК"},{t:"Драйв и смена событий", a:"ОПЕРАТОР"}]},
            {q:"В новом месте вы смотрите на:", o:[{t:"Слабые места и выходы", a:"СКАНЕР"},{t:"Общую структуру", a:"АРХИТЕКТОР"}]},
            {q:"Принятие решений основано на:", o:[{t:"Внутреннем чутье", a:"ТЕХНО-МЕДИУМ"},{t:"Расчете и фактах", a:"АНАЛИТИК"}]},
            {q:"В работе вы цените:", o:[{t:"Порядок и предсказуемость", a:"АРХИТЕКТОР"},{t:"Гибкость и импровизацию", a:"ТЕХНО-МЕДИУМ"}]},
            {q:"Обнаружена ложь. Ваша реакция?", o:[{t:"Запомню уязвимость", a:"СКАНЕР"},{t:"Сразу разгромлю фактами", a:"АНАЛИТИК"}]},
            {q:"В момент кризиса вы:", o:[{t:"Реагируете мгновенно", a:"ОПЕРАТОР"},{t:"Просчитываете варианты", a:"АРХИТЕКТОР"}]},
            {q:"Правила — это:", o:[{t:"Основа безопасности", a:"АРХИТЕКТОР"},{t:"Инструмент, который можно гнуть", a:"СКАНЕР"}]},
            {q:"Риск ради большой цели:", o:[{t:"Рационально недопустим", a:"АНАЛИТИК"},{t:"Оправдан азартом", a:"ОПЕРАТОР"}]},
            {q:"В толпе вы чувствуете:", o:[{t:"Потоки энергии и ритм", a:"ТЕХНО-МЕДИУМ"},{t:"Потенциальную опасность", a:"СКАНЕР"}]},
            {q:"Сильная сторона:", o:[{t:"Видение сути вещей", a:"АНАЛИТИК"},{t:"Управление хаосом", a:"ТЕХНО-МЕДИУМ"}]},
            {q:"Поломка системы. Ваш подход:", o:[{t:"Ремонт по регламенту", a:"АРХИТЕКТОР"},{t:"Быстрый костыль", a:"ОПЕРАТОР"}]},
            {q:"Ваш вектор движения?", o:[{t:"Тотальный контроль", a:"СКАНЕР"},{t:"Гармония в потоке", a:"ТЕХНО-МЕДИУМ"}]}
        ];

        function sw(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function startSequence() { beep(400); curQ=0; sc={}; renderQ(); sw('s-test'); }
        function renderQ() {
            const q = qs[curQ]; document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-counter').innerText = `MOD ${curQ+1} / ${qs.length}`;
            const box = document.getElementById('options-list'); box.innerHTML = "";
            q.o.forEach(o => {
                const b = document.createElement('button'); b.className = "btn"; b.innerText = o.t;
                b.onclick = () => { beep(1000); sc[o.a]=(sc[o.a]||0)+1; curQ++; if(curQ<qs.length) renderQ(); else startReaction(); };
                box.appendChild(b);
            });
        }
        function startReaction() { target=1; attempts=3; renderG(); sw('s-game'); }
        function renderG() {
            document.getElementById('target-hint').innerText = `ПОИСК: ${target}`;
            const g = document.getElementById('g-grid'); g.innerHTML = "";
            let ns = Array.from({length:16},(_,i)=>i+1).sort(()=>Math.random()-0.5);
            ns.forEach(n => {
                const c = document.createElement('div'); c.className = "cell"; c.innerText = n;
                c.onclick = () => {
                    if(n === target) { beep(1200); target++; if(target>16) finalize(); else renderG(); }
                    else { beep(200, 0.3, 'sawtooth'); attempts--; updateAtt(); c.classList.add('err-flash'); setTimeout(()=>c.classList.remove('err-flash'),200); if(attempts<=0) finalize(); }
                }
                g.appendChild(c);
            });
        }
        function updateAtt() { document.getElementById('att-bar').innerText = "[ " + "■ ".repeat(attempts) + "□ ".repeat(3-attempts) + "]"; }
        function finalize() {
            fType = Object.keys(sc).reduce((a,b)=>sc[a]>sc[b]?a:b) || "АНАЛИТИК";
            const d = DATA[fType];
            document.getElementById('d-title').innerText = fType;
            document.getElementById('pi').innerText = d.pi; document.getElementById('di').innerText = d.di;
            document.getElementById('v-card').classList.add('open');
            setTimeout(() => {
                document.getElementById('b-log').style.width = d.log + "%";
                document.getElementById('b-react').style.width = (target*6) + "%";
                document.getElementById('b-mem').style.width = "80%";
            }, 500);
            isDone = true; renderRadar();
        }
        let angle = 0;
        function renderRadar() {
            const canvas = document.getElementById('avatar-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 200;
            function draw() {
                if(!isDone) return;
                ctx.fillStyle = 'rgba(0,5,0,0.1)'; ctx.fillRect(0,0,200,200);
                ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(100,100,80,0,Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(100,100); ctx.lineTo(100+Math.cos(angle)*80, 100+Math.sin(angle)*80); ctx.stroke();
                angle += 0.05; requestAnimationFrame(draw);
            }
            draw();
            document.getElementById('p-label').innerText = fType; document.getElementById('p-label').style.display='block';
            document.getElementById('btn-oracle').style.display='block';
        }
        function tgl(id) { const e = document.getElementById(id); e.style.display = (e.style.display==='block')?'none':'block'; }
        function closeProfile() { document.getElementById('v-card').classList.remove('open'); sw('s-main'); }
        function showProfile() { if(isDone) document.getElementById('v-card').classList.add('open'); }
        function oracleSpeak() { const s = new SpeechSynthesisUtterance(DATA[fType].oracle); s.lang='ru-RU'; s.pitch=0.6; window.speechSynthesis.speak(s); }
        
        const mC = document.getElementById('m'), mCtx = mC.getContext('2d');
        let mW = mC.width = window.innerWidth, mH = mC.height = window.innerHeight;
        const drops = Array(Math.floor(mW/20)).fill(1);
        function drawM() { mCtx.fillStyle='rgba(0,0,0,0.1)'; mCtx.fillRect(0,0,mW,mH); mCtx.fillStyle='#0f0'; mCtx.font='15px monospace'; drops.forEach((y,i)=>{ mCtx.fillText(String.fromCharCode(0x30A0+Math.random()*96), i*20, y*20); if(y*20>mH && Math.random()>0.975) drops[i]=0; drops[i]++; }); }
        setInterval(drawM, 50);
        window.onresize = () => { mW = mC.width = window.innerWidth; mH = mC.height = window.innerHeight; };
    </script>
</body>
</html>
